services:
  food-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-app-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    labels:
      - "app=food-ordering"
      - "environment=production"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Note: This compose file intentionally contains only the frontend service
# because this repository is a frontend-only Vite application. Removing
# the `api-server` and `database` services prevents containers from failing
# due to missing backend scripts and keeps CI/CD deployments minimal.
