services:
  food-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-app-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    labels:
      - "app=food-ordering"
      - "environment=production"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5173', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Note: This compose file intentionally contains only the frontend service
# because this repository is a frontend-only Vite application. Removing
# the `api-server` and `database` services prevents containers from failing
# due to missing backend scripts and keeps CI/CD deployments minimal.
